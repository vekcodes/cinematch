<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineMatch - Movie Recommendations</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='netflix.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <h1 class="logo">🎬 CineMatch</h1>
            <div class="nav-right">
                <button class="nav-btn" onclick="openAddMovieModal()">+ Add Movie</button>
                <button class="nav-btn" onclick="openRecommendationModal()">Get Recommendations</button>
                <a href="/profile" class="nav-btn profile-link">Profile</a>
                <a href="/logout" class="nav-btn logout-btn">Logout</a>
            </div>
        </div>
    </nav>

    <div class="main-container">
        <section class="section">
            <h2>Recommended For You</h2>
            <div class="movie-grid" id="recommendedGrid">
                <p class="empty-msg">Click "Get Recommendations" to see personalized picks</p>
            </div>
        </section>

        <section class="section">
            <h2>All Movies</h2>
            <div class="movie-grid" id="allMoviesGrid"></div>
        </section>
    </div>

    <!-- Add Movie Modal -->
    <div id="addMovieModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeAddMovieModal()">&times;</span>
            <h2>Search & Add Movie</h2>

            <div class="tab-buttons">
                <button class="tab-btn active" onclick="switchTab('search')">Search TMDB</button>
                <button class="tab-btn" onclick="switchTab('manual')">Add Manually</button>
            </div>

            <!-- Search Tab -->
            <div id="searchTab" class="tab-content active">
                <input type="text" id="searchQuery" placeholder="Search for a movie...">
                <div id="searchResults" class="search-results"></div>
            </div>

            <!-- Manual Tab -->
            <div id="manualTab" class="tab-content">
                <input type="text" id="manualTitle" placeholder="Title" required>
                <input type="text" id="manualGenres" placeholder="Genres (comma separated)">
                <input type="text" id="manualDirector" placeholder="Director">
                <input type="text" id="manualCast" placeholder="Cast (comma separated)">
                <textarea id="manualOverview" placeholder="Overview"></textarea>
                <input type="text" id="manualPosterUrl" placeholder="Poster URL">
                <button class="btn" onclick="addMovieManual()">Add Movie</button>
            </div>
        </div>
    </div>

    <!-- Recommendation Modal -->
    <div id="recommendationModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeRecommendationModal()">&times;</span>
            <h2>Get Recommendations</h2>

            <div class="form-group">
                <label>Mode:</label>
                <select id="recMode" onchange="updateRecommendationForm()">
                    <option value="collaborative">Based on Your Taste</option>
                    <option value="content">Similar to a Movie</option>
                    <option value="hybrid">Hybrid (Balanced)</option>
                </select>
            </div>

            <div id="movieSelect" style="display:none;" class="form-group">
                <label>Select a Movie:</label>
                <select id="recMovie"></select>
            </div>

            <div id="alphaSlider" style="display:none;" class="form-group">
                <label>Taste Weight (More Left = Your Taste)</label>
                <input type="range" id="alpha" min="0" max="1" step="0.1" value="0.5">
                <span id="alphaValue">50% Your Taste / 50% Collaborative</span>
            </div>

            <button class="btn" onclick="getRecommendations()">Get Recommendations</button>
            <div id="recResults" class="rec-results"></div>
        </div>
    </div>

    <!-- Movie Detail Modal -->
    <div id="movieDetailModal" class="modal">
        <div class="modal-content movie-detail">
            <span class="close" onclick="closeMovieDetailModal()">&times;</span>
            <div id="movieDetailContent"></div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='netflix.js') }}"></script>
</body>
</html>
